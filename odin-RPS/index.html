<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odin-RPS</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./index.js" defer></script>
  </head>
  <body>
    <section class="container">
      <div class="scores">
        <div class="score-machine">
          <h2>CPU</h2>
          <p id="machine-score">0</p>
        </div>

        <div class="score-human">
          <h2>You</h2>
          <p id="human-score">0</p>
        </div>
      </div>

      <div class="buttons">
        <form>
          <input type="radio" name="choice" value="rock" id="rock" />
          <label for="rock">Rock</label>
          <input type="radio" name="choice" value="paper" id="paper" />
          <label for="paper">Paper</label>
          <input type="radio" name="choice" value="scissors" id="scissors" />
          <label for="scissors">Scissors</label>
        </form>
      </div>

      <button class="play-button">Play</button>
    </section>
  </body>
</html>
